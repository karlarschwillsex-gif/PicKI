<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PicKI-Elements – Charakter wählen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap');
:root{--bg:#06080f;--surface:#0c0f1a;--card:#111827;--border:#1e2535;--accent:#7c5cfc;--accent2:#fc5c9c;--text:#e8eaf6;--muted:#4a5280;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Exo 2',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:min(70vw,70vh);height:min(70vw,70vh);background-image:url('assets/logo.png');background-size:contain;background-repeat:no-repeat;background-position:center;opacity:0.04;pointer-events:none;z-index:0;filter:grayscale(100%) brightness(3);}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10;}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 14px;color:var(--text);font-family:'Exo 2';font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.title{font-family:'Exo 2';font-weight:900;font-size:18px;}
.title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;position:relative;z-index:1;padding:20px;}
.headline{text-align:center;}
.headline h2{font-size:13px;font-family:'Share Tech Mono';color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:12px;}
.headline h1{font-size:clamp(24px,4vw,38px);font-weight:900;line-height:1.1;}
.headline h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:100%;max-width:600px;}
@media(min-width:700px){.cards{grid-template-columns:repeat(4,1fr);max-width:860px;}}
.card{position:relative;background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px 16px 24px;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;gap:14px;overflow:hidden;}
.card:hover{transform:translateY(-6px);}
.card-glow{position:absolute;inset:0;opacity:0;transition:opacity .3s;border-radius:18px;}
.card:hover .card-glow{opacity:1;}
.card-icon{font-size:52px;line-height:1;position:relative;z-index:1;}
.card-label{font-size:16px;font-weight:900;position:relative;z-index:1;}
.card-sub{font-size:11px;font-family:'Share Tech Mono';color:var(--muted);position:relative;z-index:1;text-align:center;line-height:1.6;}
.card-arrow{position:absolute;bottom:14px;right:16px;font-size:18px;opacity:0;transition:all .2s;z-index:1;}
.card:hover .card-arrow{opacity:1;transform:translateX(4px);}
/* Farben */
.card-f{--col:#fc5c9c;}
.card-f:hover{border-color:#fc5c9c;box-shadow:0 12px 40px rgba(252,92,156,0.25);}
.card-f .card-label{color:#fc5c9c;}
.card-f .card-arrow{color:#fc5c9c;}
.card-f .card-glow{background:radial-gradient(ellipse at center,rgba(252,92,156,0.08) 0%,transparent 70%);}
.card-m{--col:#5c9cfc;}
.card-m:hover{border-color:#5c9cfc;box-shadow:0 12px 40px rgba(92,156,252,0.25);}
.card-m .card-label{color:#5c9cfc;}
.card-m .card-arrow{color:#5c9cfc;}
.card-m .card-glow{background:radial-gradient(ellipse at center,rgba(92,156,252,0.08) 0%,transparent 70%);}
.card-d{--col:#c85cfc;}
.card-d:hover{border-color:#c85cfc;box-shadow:0 12px 40px rgba(200,92,252,0.25);}
.card-d .card-label{color:#c85cfc;}
.card-d .card-arrow{color:#c85cfc;}
.card-d .card-glow{background:radial-gradient(ellipse at center,rgba(200,92,252,0.08) 0%,transparent 70%);}
.card-k{--col:#fc9c5c;}
.card-k:hover{border-color:#fc9c5c;box-shadow:0 12px 40px rgba(252,156,92,0.25);}
.card-k .card-label{color:#fc9c5c;}
.card-k .card-arrow{color:#fc9c5c;}
.card-k .card-glow{background:radial-gradient(ellipse at center,rgba(252,156,92,0.08) 0%,transparent 70%);}
/* Entrance animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeUp .4s ease both;}
.card:nth-child(1){animation-delay:.05s;}
.card:nth-child(2){animation-delay:.1s;}
.card:nth-child(3){animation-delay:.15s;}
.card:nth-child(4){animation-delay:.2s;}
.hint-text{font-family:'Share Tech Mono';font-size:10px;color:var(--muted);text-align:center;animation:fadeUp .4s .3s ease both;}
</style>
</head>
<body>

<header class="header">
  <button class="back-btn" onclick="goHome()">← Zurück</button>
  <div class="title">PicKI <span>Elements</span></div>
  <div style="width:80px"></div>
</header>

<div class="main">
  <div class="headline">
    <h2>Schritt 0 · Body Editor</h2>
    <h1>Wen möchtest du<br><span>gestalten?</span></h1>
  </div>

  <div class="cards">
    <div class="card card-f" onclick="choose('f')">
      <div class="card-glow"></div>
      <div class="card-icon">♀️</div>
      <div class="card-label">Frau</div>
      <div class="card-sub">Weiblicher<br>Charakter</div>
      <div class="card-arrow">→</div>
    </div>
    <div class="card card-m" onclick="choose('m')">
      <div class="card-glow"></div>
      <div class="card-icon">♂️</div>
      <div class="card-label">Mann</div>
      <div class="card-sub">Männlicher<br>Charakter</div>
      <div class="card-arrow">→</div>
    </div>
    <div class="card card-d" onclick="choose('d')">
      <div class="card-glow"></div>
      <div class="card-icon">⚧️</div>
      <div class="card-label">Divers</div>
      <div class="card-sub">Diverser<br>Charakter</div>
      <div class="card-arrow">→</div>
    </div>
    <div class="card card-k" onclick="choose('k')">
      <div class="card-glow"></div>
      <div class="card-icon">🦊</div>
      <div class="card-label">Kemi</div>
      <div class="card-sub">Fuchs-Mensch<br>Mischling</div>
      <div class="card-arrow">→</div>
    </div>
  </div>

  <div class="hint-text">Wähle einen Typ um den Body Editor zu öffnen</div>
</div>

<script>
function choose(g){
  if(window.api) window.api.navigate('step0'+g);
  else location.href = 'step0'+g+'.html';
}
function goHome(){
  if(window.api) window.api.navigate('home');
  else history.back();
}
</script>
</body>
</html>
